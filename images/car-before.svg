<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" role="img" aria-label="修理前のキズがある車">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f4f7"/>
      <stop offset="1" stop-color="#e4e9ef"/>
    </linearGradient>
    <linearGradient id="bodyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aab6c2"/>
      <stop offset="1" stop-color="#8a98a6"/>
    </linearGradient>
  </defs>
  <rect width="240" height="150" fill="url(#bgB)"/>
  <ellipse cx="120" cy="126" rx="92" ry="9" fill="#6b7886" opacity="0.16"/>
  <!-- 車体 -->
  <path d="M34,112 Q24,112 24,100 L24,92 Q24,85 33,83 L62,79 L82,54 Q87,48 96,48 L150,48 Q160,48 166,55 L185,80 L210,84 Q220,86 220,96 L220,102 Q220,112 210,112 Z" fill="url(#bodyB)"/>
  <!-- 窓 -->
  <path d="M86,78 L99,57 L118,57 L118,78 Z" fill="#dde3ea"/>
  <path d="M124,57 L145,57 L162,78 L124,78 Z" fill="#dde3ea"/>
  <!-- ドアライン -->
  <line x1="121" y1="82" x2="121" y2="108" stroke="#6f7d8b" stroke-width="2"/>
  <!-- ヘコミ（影） -->
  <ellipse cx="150" cy="92" rx="14" ry="10" fill="#6f7d8b" opacity="0.45"/>
  <ellipse cx="150" cy="92" rx="7" ry="5" fill="#5c6975" opacity="0.5"/>
  <!-- キズ（赤いひっかき傷） -->
  <polyline points="60,96 78,90 92,99 110,92" fill="none" stroke="#e1242b" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- タイヤ -->
  <circle cx="74" cy="112" r="20" fill="#1b2733"/>
  <circle cx="74" cy="112" r="8.5" fill="#aeb8c4"/>
  <circle cx="176" cy="112" r="20" fill="#1b2733"/>
  <circle cx="176" cy="112" r="8.5" fill="#aeb8c4"/>
  <!-- 注意マーク -->
  <path d="M150,20 L162,42 L138,42 Z" fill="#ffce3a" stroke="#e1242b" stroke-width="2" stroke-linejoin="round"/>
  <line x1="150" y1="29" x2="150" y2="35" stroke="#7a4a00" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="150" cy="39" r="1.4" fill="#7a4a00"/>
</svg>
